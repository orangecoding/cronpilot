name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reliably trigger the bug.
      placeholder: |
        1. Create a job with schedule `* * * * *`
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: How are you running CronPilot?
      options:
        - Docker (docker run)
        - Docker Compose
        - Node.js (yarn start / yarn dev)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / image tag
      placeholder: "e.g. latest, 1.2.0, or commit SHA"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Host OS
      placeholder: "e.g. Ubuntu 24.04, macOS 15, Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant server logs or browser console errors.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant (screenshots, config snippets, etc.)
